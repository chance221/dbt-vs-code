sources:
  - name: jaffle_shop
    description: A clone of a Snowflake database
    database: raw
    schema: jaffle_shop
    tables:
      - name: customers
        description: raw customers data
        columns:
          - name: id
            description: the unique identifier and primary key for a customer
            data_tests:
                - not_null
                - unique
      - name: orders
        description: raw orders data
        config:
          freshness:
            warn_after: 
              count: 24 
              period: hour
            error_after: 
              count: 48 
              period: hour
          
          loaded_at_field: _etl_loaded_at
  